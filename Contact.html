<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      background-color: rgba(168, 212, 244, 0.945);
      font-family: Arial, sans-serif;
    }

 .home-btn {
  position: fixed;       /* always visible */
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, #2df9fc);
  color: white;
  padding: 12px 24px;
  border-radius: 25px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
  font-size: 18px;
  z-index: 999;          /* stays above everything */
}

.home-btn:hover {
  background: linear-gradient(135deg, #5aedf7);
  transform: scale(1.05);
}

/* 📱 Mobile */
@media (max-width: 480px) {
  .home-btn {
    top: 10px;
    right: 10px;
    padding: 8px 16px;
    font-size: 14px;
  }
}

/* 📱 Tablet */
@media (min-width: 481px) and (max-width: 768px) {
  .home-btn {
    top: 15px;
    right: 15px;
    padding: 10px 20px;
    font-size: 16px;
  }
}

/* 💻 Laptop */
@media (min-width: 769px) and (max-width: 1024px) {
  .home-btn {
    top: 20px;
    right: 20px;
    padding: 12px 22px;
    font-size: 17px;
  }
}

/* 🖥️ Desktop */
@media (min-width: 1025px) {
  .home-btn {
    top: 20px;
    right: 20px;
    padding: 12px 24px;
    font-size: 18px;
  }
}


    .parents {
      display: flex;
      justify-content: space-between;
      gap: 6vh;
      padding: 20px;
    }

    .skills,
    .js,
    .react {
      position: relative;
      min-height: 500px;   
       width: 40vw;
      border: 2px solid #fff;
      border-radius: 22.5px;
      box-shadow: inset 5px 0px 20px 0px rgb(75, 98, 116);
      overflow: hidden;
      
    }
    .skills:hover,
    .js:hover,
    .react:hover{
      transition: 0.5s all ease  ;
      transform: scale(1.1);
    }

    /* Video background */
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      border-radius: 22.5px;
    }

    /* Overlay content */
    .overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      padding: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.3); /* Transparent overlay for clarity */
    }

    .overlay h2 {
      font-weight: lighter;
      text-align: center;
      margin-bottom: 10px;
    }

    .overlay a {
      margin-bottom: 15px;
      font-size: 40px;
      color: white;
      transition: color 0.3s ease;
    }

    .overlay a:hover {
      color: #E1306C; /* Instagram pink */
    }

    .js .overlay a:hover {
      color: #1877F2; /* Facebook blue */
    }

    .react .overlay a:hover {
      color: #000; /* GitHub black */
    }

    .js2 {
      font-size: 45px;
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }
    
@media (max-width: 480px) {
  .parents {
    flex-direction: column;
    align-items: center;
  }
  .skills, .js, .react {
    width: 90%;
    min-height: 400px;   /* keep consistent height */
    margin-bottom: 20px;
  }
}

@media (min-width: 481px) and (max-width: 768px) {
  .parents {
    flex-direction: column;
    align-items: center;
  }
  .skills, .js, .react {
    width: 80%;
    min-height: 420px;   /* slightly taller for tablets */
    margin-bottom: 25px;
  }
}

@media (min-width: 769px) and (max-width: 1024px) {
  .parents {
    flex-direction: row;
    gap: 4vh;
  }
  .skills, .js, .react {
    width: 28vw;
    min-height: 450px;
  }
}

@media (min-width: 1025px) {
  .parents {
    flex-direction: row;
    gap: 6vh;
  }
  .skills, .js, .react {
    width: 30vw;
    min-height: 450px;
  }
}

    
    
  </style>
</head>

<body>
  <a href="index.html" class="home-btn">HOME</a>

  <section class="about">
    <h2 class="js2">CONTACT LINKS</h2>
    <div class="parents">
      
      <div class="skills">
        <video autoplay loop muted playsinline class="bg-video">
          <source src="image/videos/1.mp4" type="video/mp4">
        </video>
        <div class="overlay">
          <h2>INSTAGRAM PAGE</h2>
          <a href="https://www.instagram.com/" target="_blank">
            <i class="fa-brands fa-instagram"></i>
          </a>
        </div>
      </div>

      <!-- Facebook box -->
      <div class="js">
        <video autoplay loop muted playsinline class="bg-video">
          <source src="image/videos/2.mp4" type="video/mp4">
        </video>
        <div class="overlay">
          <h2>FACEBOOK PAGE</h2>
          <a href="https://facebook.com/" target="_blank">
            <i class="fa-brands fa-facebook"></i>
          </a>
        </div>
      </div>

      <!-- GitHub box -->
      <div class="react">
        <video autoplay loop muted playsinline class="bg-video">
          <source src="image/videos/3.mp4" type="video/mp4">
        </video>
        <div class="overlay">
          <h2>GITHUB</h2>
          <a href="https://github.com/nk2004-12" target="_blank">
            <i class="fa-brands fa-github"></i>
          </a>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
